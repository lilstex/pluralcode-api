name: PLRCAP Backend CI/CD
on:
  push:
    branches:
      - ci
  workflow_dispatch:
env:
  ACR_NAME: plrcapregistry
  IMAGE_NAME: plrcap-backend
  CONTAINER_APP_NAME: plrcap-backend
  RESOURCE_GROUP: plrcap-rg
jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: plrcapregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            --push .

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          npm config set strict-ssl false
          npx prisma@6 generate --schema=./prisma/schema/schema.prisma

      - name: Run Prisma Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx prisma@6 migrate deploy --schema=./prisma/schema/schema.prisma

      - name: Verify deployment
        run: |
          echo "✅ Image pushed to ACR successfully!"
          echo "Image: plrcapregistry.azurecr.io/plrcap-backend:${{ github.sha }}"
          echo "Container App will auto-pull :latest within a few minutes"
